name: Supabase Keep Alive

on:
  schedule:
    # 毎日AM 9:00 (UTC) / 日本時間 18:00 に自動実行
    - cron: '0 9 * * *'
  workflow_dispatch: # GitHubのウェブ画面から手動で実行できるようにする設定

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -i -X GET \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://htwbqbivryazrebjjish.supabase.co/rest/v1/profiles?limit=1"
